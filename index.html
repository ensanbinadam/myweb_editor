<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>محفظة مشاريع GitHub | المطور التعليمي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap");

      :root {
        --primary: #2563eb;
        --secondary: #4f46e5;
        --accent: #06b6d4;
        --success: #10b981;
        --warning: #f59e0b;
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        --card-bg: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: "Tajawal", sans-serif;
        background: var(--bg-gradient);
        color: #1e293b;
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      .header-section {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: var(--shadow);
        margin-bottom: 40px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .logo-preview-container {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      #logoPreview {
        max-width: 150px;
        max-height: 150px;
        border-radius: 15px;
        display: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: var(--primary);
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .input-group {
        text-align: right;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #475569;
      }
      input[type="text"] {
        width: 100%;
        padding: 14px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        box-sizing: border-box;
        transition: 0.3s;
      }
      input[type="text"]:focus {
        border-color: var(--primary);
        outline: none;
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 30px;
      }

      .btn {
        padding: 12px 24px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        color: white;
        font-family: inherit;
        font-size: 15px;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-primary {
        background: var(--primary);
      }
      .btn-success {
        background: var(--success);
      }
      .btn-warning {
        background: var(--warning);
      }
      .btn-upload {
        background: #64748b;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #repoList {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 25px;
        padding: 0;
        list-style: none;
      }
      .repo-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px;
        box-shadow: var(--shadow);
        border-top: 6px solid var(--primary);
        position: relative;
      }
      .checkbox-wrapper {
        position: absolute;
        top: 20px;
        left: 20px;
      }
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 12px;
        margin: 15px 0;
        font-family: inherit;
        resize: vertical;
        box-sizing: border-box;
      }
      iframe.preview {
        width: 100%;
        height: 300px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        margin-top: 15px;
        display: none;
      }

      .tag-btn {
        background: #e2e8f0;
        color: #333;
        border: none;
        padding: 6px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-family: inherit;
        transition: 0.2s;
      }
      .tag-btn:hover {
        background: #cbd5e1;
      }
      .tag-btn.active {
        background: var(--primary);
        color: white;
      }

      footer {
        margin-top: 60px;
        text-align: center;
        padding: 30px;
        border-top: 1px solid #e2e8f0;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-section">
        <div class="logo-preview-container">
          <img id="logoPreview" src="" alt="شعار الموقع" />
          <label class="btn btn-upload">
            🖼️ رفع الشعار (يظهر في التصدير)
            <input
              type="file"
              id="logoInput"
              accept="image/*"
              style="display: none"
              onchange="handleLogoUpload(event)"
            />
          </label>
        </div>

        <h1>محفظة المشاريع البرمجية والتعليمية</h1>
        <p>
          أداة احترافية لتنظيم وتصدير مشاريعك من GitHub مع دعم الهاشتاقات
          والشعارات.
        </p>

        <div class="controls">
          <div class="input-group">
            <label>اسم مستخدم GitHub:</label>
            <input id="username" type="text" placeholder="مثال: username" />
          </div>
          <div class="input-group">
            <label>اسم الموقع (للعنوان الرئيسي):</label>
            <input
              id="arabicName"
              type="text"
              placeholder="مثال: أدوات أ. عبدالله"
            />
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-primary" onclick="fetchRepos()">
            📂 جلب المشاريع
          </button>
          <button class="btn btn-warning" onclick="toggleAllCheckboxes()">
            ✅ تحديد الكل
          </button>
          <button class="btn btn-success" onclick="exportHTML(true)">
            📤 تصدير احترافي (مع الهاشتاقات)
          </button>
          <button class="btn" style="background: #475569" onclick="saveDraft()">
            💾 حفظ مسودة
          </button>
          <button class="btn" style="background: #94a3b8" onclick="loadDraft()">
            📂 استرجاع
          </button>
        </div>
      </div>

      <div
        id="categoryContainer"
        style="
          display: none;
          background: white;
          padding: 20px;
          border-radius: 20px;
          margin-bottom: 25px;
          text-align: right;
          box-shadow: var(--shadow);
        "
      >
        <h3 style="margin-top: 0; color: var(--primary)">
          🏷️ تصنيفات الهاشتاق (معاينة):
        </h3>
        <div
          id="categoryTags"
          style="display: flex; gap: 10px; flex-wrap: wrap"
        ></div>
      </div>

      <ul id="repoList"></ul>

      <footer>
        <a
          href="https://t.me/Interact2030"
          target="_blank"
          style="text-decoration: none; color: inherit"
        >
          برمجة وتصميم: ملتقى التعليم التفاعلي | المملكة العربية السعودية 🇸🇦
        </a>
      </footer>
    </div>

    <script>
      let savedLogoBase64 = "";

      function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            savedLogoBase64 = e.target.result;
            const preview = document.getElementById("logoPreview");
            preview.src = savedLogoBase64;
            preview.style.display = "block";
          };
          reader.readAsDataURL(file);
        }
      }

      async function fetchRepos() {
        const user = document.getElementById("username").value.trim();
        const list = document.getElementById("repoList");
        if (!user) return alert("يرجى إدخال اسم المستخدم");

        list.innerHTML =
          "<p style='text-align:center; grid-column:1/-1; font-weight:bold;'>⏳ جاري الاتصال بـ GitHub...</p>";

        try {
          const res = await fetch(
            `https://api.github.com/users/${user}/repos?sort=updated&per_page=100`,
          );
          const data = await res.json();
          list.innerHTML = "";

          if (data.length === 0 || data.message === "Not Found") {
            list.innerHTML =
              "<p style='text-align:center; grid-column:1/-1; color:red;'>❌ لم يتم العثور على مشاريع.</p>";
            return;
          }

          data.forEach((repo) => {
            const li = createCard(repo.name, repo.description, user, true);
            list.appendChild(li);
          });
          updateTags();
        } catch (e) {
          alert("حدث خطأ في الاتصال");
        }
      }

      function createCard(name, desc, user, checked) {
        const url = `https://${user}.github.io/${name}/`;
        const li = document.createElement("li");
        li.className = "repo-card";
        li.innerHTML = `
                <div class="checkbox-wrapper"><input type="checkbox" class="select-box" data-name="${name}" ${checked ? "checked" : ""} style="transform: scale(1.5);"></div>
                <strong style="font-size:1.2em; color:var(--primary); display:block; margin-bottom:5px;">📂 ${name}</strong>
                <a href="${url}" target="_blank" style="color:#64748b; font-size:0.9em; text-decoration:none; word-break: break-all;">${url}</a>
                <label style="display:block; margin-top:15px; font-weight:bold; font-size:0.9em; color:#475569;">وصف المشروع والهاشتاقات:</label>
                <textarea rows="3" placeholder="مثال: أداة لتحليل النتائج #أدوات_تقنية #رياضيات" data-name="${name}">${desc || ""}</textarea>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-primary" style="flex:1; padding:8px; justify-content:center;" onclick="window.open('${url}')">🌐 زيارة</button>
                    <button class="btn btn-warning" style="flex:1; padding:8px; justify-content:center; background:#64748b;" onclick="togglePrev('${name}', '${url}')">👁️ معاينة</button>
                </div>
                <iframe id="frame-${name}" class="preview"></iframe>
            `;
        li.querySelector("textarea").addEventListener("input", updateTags);
        return li;
      }

      function togglePrev(name, url) {
        const f = document.getElementById(`frame-${name}`);
        if (!f.src) f.src = url;
        f.style.display = f.style.display === "none" ? "block" : "none";
      }

      function toggleAllCheckboxes() {
        const boxes = document.querySelectorAll(".select-box");
        const all = [...boxes].every((b) => b.checked);
        boxes.forEach((b) => (b.checked = !all));
      }

      function updateTags() {
        const tags = new Set();
        document.querySelectorAll("textarea").forEach((t) => {
          const matches = t.value.match(/#[\w\u0600-\u06FF_]+/g);
          if (matches) matches.forEach((m) => tags.add(m));
        });
        const container = document.getElementById("categoryContainer");
        const tagBox = document.getElementById("categoryTags");
        if (tags.size === 0) {
          container.style.display = "none";
          return;
        }

        container.style.display = "block";
        tagBox.innerHTML =
          '<button class="tag-btn active" onclick="filterLocal(null, this)">الكل</button>';
        tags.forEach((tag) => {
          const b = document.createElement("button");
          b.className = "tag-btn";
          b.innerText = tag;
          b.onclick = function () {
            filterLocal(tag, this);
          };
          tagBox.appendChild(b);
        });
      }

      function filterLocal(tag, btnElement) {
        document
          .querySelectorAll("#categoryTags .tag-btn")
          .forEach((b) => b.classList.remove("active"));
        btnElement.classList.add("active");

        document.querySelectorAll("#repoList li").forEach((li) => {
          const txt = li.querySelector("textarea").value;
          li.style.display = !tag || txt.includes(tag) ? "block" : "none";
        });
      }

      function saveDraft() {
        const data = {
          user: document.getElementById("username").value,
          name: document.getElementById("arabicName").value,
          logo: savedLogoBase64,
          repos: [...document.querySelectorAll("#repoList li")].map((li) => ({
            name: li.querySelector(".select-box").dataset.name,
            checked: li.querySelector(".select-box").checked,
            desc: li.querySelector("textarea").value,
          })),
        };
        localStorage.setItem("github_portfolio_v4", JSON.stringify(data));
        alert("✅ تم حفظ المسودة بنجاح");
      }

      function loadDraft() {
        const data = JSON.parse(localStorage.getItem("github_portfolio_v4"));
        if (!data) return alert("لا توجد مسودة محفوظة");

        document.getElementById("username").value = data.user || "";
        document.getElementById("arabicName").value = data.name || "";

        if (data.logo) {
          savedLogoBase64 = data.logo;
          const preview = document.getElementById("logoPreview");
          preview.src = savedLogoBase64;
          preview.style.display = "block";
        }

        const list = document.getElementById("repoList");
        list.innerHTML = "";
        if (data.repos) {
          data.repos.forEach((r) =>
            list.appendChild(createCard(r.name, r.desc, data.user, r.checked)),
          );
          updateTags();
          alert("تم استرجاع البيانات بنجاح 📂");
        }
      }

      function exportHTML(withPreview) {
        const user = document.getElementById("username").value.trim();
        const title =
          document.getElementById("arabicName").value.trim() ||
          "مشاريعي التعليمية";

        const items = [...document.querySelectorAll(".select-box:checked")].map(
          (box) => {
            const name = box.dataset.name;
            const desc = document.querySelector(
              `textarea[data-name="${name}"]`,
            ).value;
            return { name, desc, url: `https://${user}.github.io/${name}/` };
          },
        );

        if (items.length === 0)
          return alert("يرجى تحديد مشروع واحد على الأقل للتصدير.");

        const finalHTML = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 40px 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-box { margin-bottom: 40px; }
        .site-logo { max-width: 180px; max-height: 180px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #2563eb; font-size: 2.5em; margin-bottom: 10px; }
        
        .category-nav { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-right: 5px solid #10b981; text-align: right; display: none; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .tag-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: bold; color: #475569; transition: all 0.2s; }
        .tag-btn:hover { background: #e2e8f0; }
        .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        .projects-list { display: flex; flex-direction: column; gap: 25px; }
        .project-card { position: relative; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: right; border-right: 6px solid #2563eb; transition: transform 0.3s; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* تنسيق الترقيم الجديد */
        .project-number { position: absolute; top: -15px; right: -15px; background: #2563eb; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(37,99,235,0.3); font-size: 1.2em; z-index: 10; border: 3px solid white; }
        
        .project-desc { font-size: 1.2em; line-height: 1.6; color: #334155; margin-bottom: 20px; white-space: pre-wrap; margin-top: 10px; }
        
        .actions { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .btn { text-decoration: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 15px; }
        .btn-open { background: #2563eb; }
        .btn-copy { background: #64748b; }
        
        iframe { width: 100%; height: 450px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; background: #f8fafc; }
        
        footer { margin-top: 60px; padding: 30px; background: #1e293b; color: white; border-radius: 20px 20px 0 0; }
        footer a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            ${savedLogoBase64 ? `<img src="${savedLogoBase64}" class="site-logo" alt="شعار الموقع">` : ""}
            <h1>${title}</h1>
        </div>
        
        <div id="categoryNav" class="category-nav">
            <h3 style="margin:0; color:#0f172a;">🏷️ تصنيفات المشاريع:</h3>
            <div id="exportTags" class="tags-container"></div>
        </div>

        <div class="projects-list" id="projectsContainer">
            ${items
              .map(
                (it, i) => `
                <div class="project-card" data-desc="${it.desc.replace(/"/g, "&quot;")}">
                    <div class="project-number">${i + 1}</div>
                    <div class="project-desc">${it.desc || "مشروع بدون وصف"}</div>
                    <div class="actions">
                        <a href="${it.url}" target="_blank" class="btn btn-open">🌐 فتح الموقع</a>
                        <button onclick="copyUrl(this, '${it.url}')" class="btn btn-copy">📋 نسخ الرابط</button>
                    </div>
                    ${withPreview ? `<iframe src="${it.url}" loading="lazy"></iframe>` : ""}
                </div>
            `,
              )
              .join("")}
        </div>
    </div>

    <footer>
        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 5px;">${title}</div>
        <div style="font-size: 0.9em; opacity: 0.7;">جميع الحقوق محفوظة ©</div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const cards = document.querySelectorAll(".project-card");
            const tagsSet = new Set();
            
            cards.forEach(card => {
                const text = card.getAttribute("data-desc");
                const matches = text.match(/#[\\w\\u0600-\\u06FF_]+/g);
                if (matches) {
                    matches.forEach(tag => tagsSet.add(tag));
                }
            });

            if (tagsSet.size > 0) {
                document.getElementById("categoryNav").style.display = "block";
                const tagsContainer = document.getElementById("exportTags");
                
                const allBtn = document.createElement("button");
                allBtn.className = "tag-btn active";
                allBtn.innerText = "الكل";
                allBtn.onclick = function() { filterProjects(null, this); };
                tagsContainer.appendChild(allBtn);

                tagsSet.forEach(tag => {
                    const btn = document.createElement("button");
                    btn.className = "tag-btn";
                    btn.innerText = tag;
                    btn.onclick = function() { filterProjects(tag, this); };
                    tagsContainer.appendChild(btn);
                });
            }
        });

        function filterProjects(tag, btnElement) {
            document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
            btnElement.classList.add("active");

            // إعادة الترقيم بناءً على الفلترة
            let visibleCount = 1;
            document.querySelectorAll(".project-card").forEach(card => {
                const text = card.getAttribute("data-desc");
                if (!tag || text.includes(tag)) {
                    card.style.display = "block";
                    card.querySelector('.project-number').innerText = visibleCount++; // تحديث الرقم
                } else {
                    card.style.display = "none";
                }
            });
        }

        function copyUrl(btn, url) {
            navigator.clipboard.writeText(url).then(() => {
                const originalText = btn.innerHTML;
                const originalBg = btn.style.backgroundColor;
                btn.innerHTML = '✅ تم النسخ';
                btn.style.backgroundColor = '#10b981';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = originalBg;
                }, 2000);
            });
        }
    <\/script>
</body>
</html>`;

        const blob = new Blob([finalHTML], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `portfolio_${title.replace(/\s+/g, "_")}.html`;
        a.click();
      }
    </script>
  </body>
</html>
