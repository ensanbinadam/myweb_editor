<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محفظة مشاريع GitHub | المطور التعليمي</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap");

      :root {
        --primary: #2563eb;
        --secondary: #4f46e5;
        --accent: #06b6d4;
        --success: #10b981;
        --warning: #f59e0b;
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        --card-bg: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: "Tajawal", sans-serif;
        background: var(--bg-gradient);
        color: #1e293b;
        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      .header-section {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        box-shadow: var(--shadow);
        margin-bottom: 40px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .logo-preview-container {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      #logoPreview {
        max-width: 150px;
        max-height: 150px;
        border-radius: 15px;
        display: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: var(--primary);
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .input-group {
        text-align: right;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #475569;
      }
      input[type="text"] {
        width: 100%;
        padding: 14px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        box-sizing: border-box;
        transition: 0.3s;
      }
      input[type="text"]:focus {
        border-color: var(--primary);
        outline: none;
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 30px;
      }

      .btn {
        padding: 12px 24px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        color: white;
        font-family: inherit;
        font-size: 15px;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-primary {
        background: var(--primary);
      }
      .btn-success {
        background: var(--success);
      }
      .btn-warning {
        background: var(--warning);
      }
      .btn-info {
        background: #0ea5e9;
      }
      .btn-danger {
        background: #ef4444;
      }
      .btn-upload {
        background: #64748b;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #repoList {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 25px;
        padding: 0;
        list-style: none;
      }
      .repo-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px;
        box-shadow: var(--shadow);
        border-top: 6px solid var(--primary);
        position: relative;
      }
      .remove-card-btn {
        position: absolute;
        top: 18px;
        right: 18px;
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 50%;
        background: #fee2e2;
        color: #b91c1c;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }
      .remove-card-btn:hover {
        background: #fecaca;
      }
      .checkbox-wrapper {
        position: absolute;
        top: 20px;
        left: 20px;
      }
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 12px;
        margin: 15px 0;
        font-family: inherit;
        resize: vertical;
        box-sizing: border-box;
      }
      iframe.preview {
        width: 100%;
        height: 300px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        margin-top: 15px;
        display: none;
      }

      .tag-btn {
        background: #e2e8f0;
        color: #333;
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-family: inherit;
        font-weight: bold;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tag-btn:hover {
        background: #cbd5e1;
      }
      .tag-btn.active {
        background: var(--primary);
        color: white;
      }
      .tag-count {
        background: rgba(0, 0, 0, 0.1);
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.85em;
      }
      .tag-btn.active .tag-count {
        background: rgba(255, 255, 255, 0.2);
      }

      footer {
        margin-top: 60px;
        text-align: center;
        padding: 30px;
        border-top: 1px solid #e2e8f0;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-section">
        <div class="logo-preview-container">
          <img id="logoPreview" src="" alt="شعار الموقع" />
          <label class="btn btn-upload">
            🖼️ رفع الشعار (يظهر في التصدير)
            <input
              type="file"
              id="logoInput"
              accept="image/*"
              style="display: none"
              onchange="handleLogoUpload(event)"
            />
          </label>
        </div>

        <h1>محفظة المشاريع البرمجية والتعليمية</h1>
        <p>
          أداة احترافية لتنظيم وتصدير مشاريعك من GitHub مع دعم الهاشتاقات
          والشعارات والإحصائيات.
        </p>

        <div class="controls">
          <div class="input-group">
            <label>اسم مستخدم GitHub:</label>
            <input id="username" type="text" placeholder="مثال: username" />
          </div>
          <div class="input-group">
            <label>اسم الموقع (للعنوان الرئيسي):</label>
            <input
              id="arabicName"
              type="text"
              placeholder="مثال: أدوات أ. عبدالله"
            />
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-primary" onclick="fetchRepos()">
            📂 جلب / مزامنة المشاريع
          </button>
          <button class="btn btn-warning" onclick="toggleAllCheckboxes()">
            ✅ تحديد الكل
          </button>
          <button class="btn btn-success" onclick="exportHTML(true)">
            📤 تصدير احترافي (مع الهاشتاقات)
          </button>
          <button class="btn btn-info" onclick="exportSettingsJSON()">
            🧾 حفظ نسخة JSON
          </button>
          <button class="btn" style="background: #7c3aed" onclick="triggerImportSettings()">
            📥 استيراد JSON
          </button>
          <button class="btn" style="background: #0891b2" onclick="addManualRepo()">
            ➕ إضافة مشروع
          </button>
          <button class="btn" style="background: #475569" onclick="saveDraft()">
            💾 حفظ مسودة
          </button>
          <button class="btn" style="background: #94a3b8" onclick="loadDraft()">
            📂 استرجاع
          </button>
        </div>
        <input
          type="file"
          id="settingsFileInput"
          accept="application/json,.json"
          style="display: none"
          onchange="importSettingsJSON(event)"
        />
      </div>

      <div
        id="categoryContainer"
        style="
          display: none;
          background: white;
          padding: 20px;
          border-radius: 20px;
          margin-bottom: 25px;
          text-align: right;
          box-shadow: var(--shadow);
        "
      >
        <h3 style="margin-top: 0; color: var(--primary)">
          🏷️ تصنيفات الهاشتاق وإحصائياتها (معاينة):
        </h3>
        <div
          id="categoryTags"
          style="display: flex; gap: 10px; flex-wrap: wrap"
        ></div>
      </div>

      <ul id="repoList"></ul>

      <footer>
        <a
          href="https://t.me/Interact2030"
          target="_blank"
          style="text-decoration: none; color: inherit"
        >
          برمجة وتصميم: ملتقى التعليم التفاعلي | المملكة العربية السعودية 🇸🇦
        </a>
      </footer>
    </div>

    <script>
      let savedLogoBase64 = "";
      let previewFrameCounter = 0;

      const CURRENT_STORAGE_KEY = "github_portfolio_v6";
      const LEGACY_STORAGE_KEYS = [
        "github_portfolio_v5",
        "github_portfolio_v4",
        "github_portfolio_v3",
        "github_portfolio_v2",
        "github_portfolio_draft",
      ];

      function escapeHTML(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function sanitizeFilename(value, fallback = "portfolio") {
        return (
          String(value || fallback)
            .trim()
            .replace(/[\\/:*?"<>|]+/g, "_")
            .replace(/\s+/g, "_")
            .slice(0, 80) || fallback
        );
      }

      function buildProjectUrl(user, name) {
        return `https://${String(user || "").trim()}.github.io/${encodeURIComponent(String(name || "").trim())}/`;
      }

      function downloadFile(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function persistSettingsLocally(data = collectSettings()) {
        try {
          localStorage.setItem(CURRENT_STORAGE_KEY, JSON.stringify(data));
          return true;
        } catch (error) {
          console.warn("تعذر حفظ المسودة محلياً:", error);
          return false;
        }
      }

      function normalizeChecked(value) {
        if (value === undefined || value === null) return true;
        if (typeof value === "string") return value !== "false";
        return Boolean(value);
      }

      function normalizeSettings(rawSettings) {
        if (!rawSettings || typeof rawSettings !== "object") return null;

        const user = rawSettings.user || rawSettings.username || "";
        const name = rawSettings.name || rawSettings.arabicName || "";
        const repos = Array.isArray(rawSettings.repos) ? rawSettings.repos : [];

        return {
          version: 6,
          user,
          name,
          logo: rawSettings.logo || "",
          repos: repos
            .filter((repo) => repo && (repo.name || repo.repo || repo.repository))
            .map((repo) => ({
              name: String(repo.name || repo.repo || repo.repository).trim(),
              checked: normalizeChecked(repo.checked),
              desc: String(repo.desc ?? repo.description ?? ""),
            })),
        };
      }

      function collectSettings() {
        return {
          version: 6,
          exportedAt: new Date().toISOString(),
          user: document.getElementById("username").value.trim(),
          name: document.getElementById("arabicName").value.trim(),
          logo: savedLogoBase64,
          repos: [...document.querySelectorAll("#repoList li")].map((li) => ({
            name: li.querySelector(".select-box").dataset.name,
            checked: li.querySelector(".select-box").checked,
            desc: li.querySelector("textarea").value,
          })),
        };
      }

      function applySettings(rawSettings) {
        const data = normalizeSettings(rawSettings);
        if (!data) return false;

        document.getElementById("username").value = data.user;
        document.getElementById("arabicName").value = data.name;

        const preview = document.getElementById("logoPreview");
        savedLogoBase64 = data.logo || "";
        if (savedLogoBase64) {
          preview.src = savedLogoBase64;
          preview.style.display = "block";
        } else {
          preview.removeAttribute("src");
          preview.style.display = "none";
        }

        const list = document.getElementById("repoList");
        list.innerHTML = "";
        data.repos.forEach((repo) => {
          list.appendChild(createCard(repo.name, repo.desc, data.user, repo.checked));
        });

        updateTags();
        return true;
      }

      function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            savedLogoBase64 = e.target.result;
            const preview = document.getElementById("logoPreview");
            preview.src = savedLogoBase64;
            preview.style.display = "block";
          };
          reader.readAsDataURL(file);
        }
      }

      async function fetchGithubRepos(user) {
        const repos = [];
        let page = 1;

        while (true) {
          const res = await fetch(
            `https://api.github.com/users/${encodeURIComponent(user)}/repos?sort=updated&per_page=100&page=${page}`,
          );
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "تعذر جلب المشاريع من GitHub");
          }
          if (!Array.isArray(data)) {
            throw new Error("استجابة GitHub غير متوقعة");
          }

          repos.push(...data);
          if (data.length < 100) break;
          page += 1;
        }

        return repos;
      }

      async function fetchRepos() {
        const user = document.getElementById("username").value.trim();
        const list = document.getElementById("repoList");
        if (!user) return alert("يرجى إدخال اسم المستخدم");

        const currentData = {};
        document.querySelectorAll("#repoList li").forEach((li) => {
          const name = li.querySelector(".select-box").dataset.name;
          const desc = li.querySelector("textarea").value;
          const checked = li.querySelector(".select-box").checked;
          currentData[name] = { desc, checked };
        });

        list.innerHTML =
          "<p style='text-align:center; grid-column:1/-1; font-weight:bold;'>⏳ جاري الاتصال بـ GitHub ومزامنة المشاريع...</p>";

        try {
          const data = await fetchGithubRepos(user);
          list.innerHTML = "";

          if (data.length === 0) {
            list.innerHTML =
              "<p style='text-align:center; grid-column:1/-1; color:red;'>❌ لم يتم العثور على مشاريع.</p>";
            return;
          }

          data.forEach((repo) => {
            let finalDesc = repo.description || "";
            let finalChecked = true;

            if (currentData[repo.name]) {
              finalDesc = currentData[repo.name].desc;
              finalChecked = currentData[repo.name].checked;
            }

            const li = createCard(repo.name, finalDesc, user, finalChecked);
            list.appendChild(li);
          });

          updateTags();
        } catch (e) {
          list.innerHTML = "";
          alert(`حدث خطأ في الاتصال: ${e.message}`);
        }
      }

      function createCard(name, desc, user, checked = true) {
        const url = buildProjectUrl(user, name);
        const frameId = `frame-${++previewFrameCounter}`;
        const li = document.createElement("li");
        li.className = "repo-card";
        li.innerHTML = `
                <button type="button" class="remove-card-btn" title="حذف المشروع">×</button>
                <div class="checkbox-wrapper"><input type="checkbox" class="select-box" data-name="${escapeHTML(name)}" ${checked ? "checked" : ""} style="transform: scale(1.5);"></div>
                <strong style="font-size:1.2em; color:var(--primary); display:block; margin-bottom:5px; padding-inline-end:40px;">📂 ${escapeHTML(name)}</strong>
                <a href="${escapeHTML(url)}" target="_blank" rel="noopener" style="color:#64748b; font-size:0.9em; text-decoration:none; word-break: break-all;">${escapeHTML(url)}</a>
                <label style="display:block; margin-top:15px; font-weight:bold; font-size:0.9em; color:#475569;">وصف المشروع والهاشتاقات:</label>
                <textarea rows="3" placeholder="مثال: أداة لتحليل النتائج #أدوات_تقنية #رياضيات" data-name="${escapeHTML(name)}">${escapeHTML(desc || "")}</textarea>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button type="button" class="btn btn-primary visit-btn" style="flex:1; padding:8px; justify-content:center;">🌐 زيارة</button>
                    <button type="button" class="btn btn-warning preview-btn" style="flex:1; padding:8px; justify-content:center; background:#64748b;">👁️ معاينة</button>
                </div>
                <iframe id="${frameId}" class="preview" title="معاينة ${escapeHTML(name)}"></iframe>
            `;
        li.querySelector("textarea").addEventListener("input", updateTags);
        li.querySelector(".visit-btn").addEventListener("click", () => {
          window.open(url, "_blank", "noopener");
        });
        li.querySelector(".preview-btn").addEventListener("click", () => {
          togglePrev(frameId, url);
        });
        li.querySelector(".remove-card-btn").addEventListener("click", () => {
          if (confirm(`حذف مشروع "${name}" من القائمة؟`)) {
            li.remove();
            updateTags();
          }
        });
        return li;
      }

      function togglePrev(frameId, url) {
        const f = document.getElementById(frameId);
        if (!f.src) f.src = url;
        f.style.display = f.style.display === "none" ? "block" : "none";
      }

      function addManualRepo() {
        const user = document.getElementById("username").value.trim();
        if (!user) return alert("أدخل اسم مستخدم GitHub أولاً.");

        const name = prompt("أدخل اسم المستودع كما يظهر في GitHub:");
        if (!name || !name.trim()) return;

        const cleanName = name.trim();
        const duplicate = [...document.querySelectorAll(".select-box")].some(
          (box) => box.dataset.name === cleanName,
        );

        if (duplicate && !confirm("هذا المشروع موجود مسبقاً. هل تريد إضافته مرة أخرى؟")) {
          return;
        }

        const desc = prompt("أدخل وصف المشروع والهاشتاقات:", "") || "";
        document
          .getElementById("repoList")
          .appendChild(createCard(cleanName, desc, user, true));
        updateTags();
      }

      function toggleAllCheckboxes() {
        const boxes = document.querySelectorAll(".select-box");
        const all = [...boxes].every((b) => b.checked);
        boxes.forEach((b) => (b.checked = !all));
        // تحديث التصنيفات بعد تحديد الكل/إلغاء التحديد في حال أردنا مستقبلا ربطها، حاليا التحديث مرتبط بالنص
      }

      function updateTags() {
        const tagCounts = {};
        let totalProjects = 0;

        document.querySelectorAll("#repoList li").forEach((li) => {
          totalProjects++;
          const textarea = li.querySelector("textarea");
          if (!textarea) return;

          const text = textarea.value;
          const matches = text.match(/#[\w\u0600-\u06FF_]+/g);

          if (matches) {
            // استخدام Set لمنع تكرار عد نفس الهاشتاق في نفس المشروع
            const uniqueTags = new Set(matches);
            uniqueTags.forEach((tag) => {
              tagCounts[tag] = (tagCounts[tag] || 0) + 1;
            });
          }
        });

        const container = document.getElementById("categoryContainer");
        const tagBox = document.getElementById("categoryTags");

        if (Object.keys(tagCounts).length === 0) {
          container.style.display = "none";
          return;
        }

        container.style.display = "block";
        tagBox.innerHTML = `
          <button class="tag-btn active" onclick="filterLocal(null, this)">
            الكل <span class="tag-count">${totalProjects}</span>
          </button>`;

        Object.keys(tagCounts).forEach((tag) => {
          const count = tagCounts[tag];
          const b = document.createElement("button");
          b.className = "tag-btn";
          b.innerHTML = `${tag} <span class="tag-count">${count}</span>`;
          b.onclick = function () {
            filterLocal(tag, this);
          };
          tagBox.appendChild(b);
        });
      }

      function filterLocal(tag, btnElement) {
        document
          .querySelectorAll("#categoryTags .tag-btn")
          .forEach((b) => b.classList.remove("active"));
        btnElement.classList.add("active");

        document.querySelectorAll("#repoList li").forEach((li) => {
          const txt = li.querySelector("textarea").value;
          li.style.display = !tag || txt.includes(tag) ? "block" : "none";
        });
      }

      function saveDraft() {
        if (persistSettingsLocally()) {
          alert("✅ تم حفظ المسودة بنجاح");
        } else {
          alert(
            "تعذر حفظ المسودة داخل المتصفح لأن مساحة التخزين ممتلئة. استخدم زر حفظ نسخة JSON لحفظ الإعدادات في ملف.",
          );
        }
      }

      function readStoredSettings(key) {
        const raw = localStorage.getItem(key);
        if (!raw) return null;

        try {
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function loadDraft() {
        const keys = [CURRENT_STORAGE_KEY, ...LEGACY_STORAGE_KEYS];
        let data = null;

        for (const key of keys) {
          data = readStoredSettings(key);
          if (data) break;
        }

        if (!data) return alert("لا توجد مسودة محفوظة مسبقاً.");
        if (!applySettings(data)) return alert("تعذر قراءة بيانات المسودة.");

        persistSettingsLocally();
        alert("تم استرجاع المسودة بنجاح 📂.");
      }

      function exportSettingsJSON() {
        const data = collectSettings();
        const json = JSON.stringify(data, null, 2);
        const filename = `github_portfolio_settings_${sanitizeFilename(data.name || data.user || "draft")}.json`;

        persistSettingsLocally(data);
        downloadFile(filename, json, "application/json;charset=utf-8");
      }

      function triggerImportSettings() {
        document.getElementById("settingsFileInput").click();
      }

      function importSettingsJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const data = JSON.parse(e.target.result);
            if (!applySettings(data)) {
              throw new Error("صيغة ملف الإعدادات غير صحيحة");
            }

            persistSettingsLocally();
            alert("تم استيراد إعدادات JSON بنجاح. يمكنك الآن التعديل ثم تصدير HTML جديد.");
          } catch (error) {
            alert(`تعذر استيراد الملف: ${error.message}`);
          } finally {
            event.target.value = "";
          }
        };
        reader.readAsText(file, "UTF-8");
      }

      function exportHTML(withPreview) {
        const user = document.getElementById("username").value.trim();
        const title =
          document.getElementById("arabicName").value.trim() ||
          "مشاريعي التعليمية";

        if (!user) return alert("يرجى إدخال اسم مستخدم GitHub قبل التصدير.");

        const items = [...document.querySelectorAll(".select-box:checked")].map(
          (box) => {
            const card = box.closest("li");
            const name = box.dataset.name;
            const desc = card.querySelector("textarea").value;
            return { name, desc, url: buildProjectUrl(user, name) };
          },
        );

        if (items.length === 0)
          return alert("يرجى تحديد مشروع واحد على الأقل للتصدير.");

        const safeTitle = escapeHTML(title);
        const safeLogo = savedLogoBase64 ? escapeHTML(savedLogoBase64) : "";
        const projectCards = items
          .map((it, i) => {
            const safeName = escapeHTML(it.name);
            const safeDesc = escapeHTML(it.desc || "مشروع بدون وصف");
            const safeDescAttr = escapeHTML(it.desc);
            const safeUrl = escapeHTML(it.url);

            return `
                <div class="project-card" data-desc="${safeDescAttr}">
                    <div class="project-number">${i + 1}</div>
                    <h2 class="project-title">${safeName}</h2>
                    <div class="project-desc">${safeDesc}</div>
                    <div class="actions">
                        <a href="${safeUrl}" target="_blank" rel="noopener" class="btn btn-open">🌐 فتح الموقع</a>
                        <button type="button" data-url="${safeUrl}" class="btn btn-copy">📋 نسخ الرابط</button>
                    </div>
                    ${withPreview ? `<iframe src="${safeUrl}" loading="lazy" title="معاينة ${safeName}"></iframe>` : ""}
                </div>
            `;
          })
          .join("");

        const finalHTML = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${safeTitle}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 40px 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-box { margin-bottom: 40px; }
        .site-logo { max-width: 180px; max-height: 180px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #2563eb; font-size: 2.5em; margin-bottom: 10px; }
        .project-title { color: #0f172a; font-size: 1.35em; margin: 0 0 12px; }
        
        .category-nav { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-right: 5px solid #10b981; text-align: right; display: none; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .tag-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: bold; color: #475569; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .tag-btn:hover { background: #e2e8f0; }
        .tag-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tag-count { background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 12px; font-size: 0.85em; }
        .tag-btn.active .tag-count { background: rgba(255,255,255,0.2); }

        .projects-list { display: flex; flex-direction: column; gap: 25px; }
        .project-card { position: relative; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: right; border-right: 6px solid #2563eb; transition: transform 0.3s; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .project-number { position: absolute; top: -15px; right: -15px; background: #2563eb; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(37,99,235,0.3); font-size: 1.2em; z-index: 10; border: 3px solid white; }
        
        .project-desc { font-size: 1.2em; line-height: 1.6; color: #334155; margin-bottom: 20px; white-space: pre-wrap; margin-top: 10px; }
        
        .actions { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .btn { text-decoration: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; font-family: inherit; font-size: 15px; }
        .btn-open { background: #2563eb; }
        .btn-copy { background: #64748b; }
        
        iframe { width: 100%; height: 450px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; background: #f8fafc; }
        
        footer { margin-top: 60px; padding: 30px; background: #1e293b; color: white; border-radius: 20px 20px 0 0; }
        footer a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            ${safeLogo ? `<img src="${safeLogo}" class="site-logo" alt="شعار الموقع">` : ""}
            <h1>${safeTitle}</h1>
        </div>
        
        <div id="categoryNav" class="category-nav">
            <h3 style="margin:0; color:#0f172a;">🏷️ تصنيفات المشاريع:</h3>
            <div id="exportTags" class="tags-container"></div>
        </div>

        <div class="projects-list" id="projectsContainer">
            ${projectCards}
        </div>
    </div>

    <footer>
        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 5px;">${safeTitle}</div>
        <div style="font-size: 0.9em; opacity: 0.7;">جميع الحقوق محفوظة ©</div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const cards = document.querySelectorAll(".project-card");
            const tagCounts = {};
            const totalProjects = cards.length;
            
            cards.forEach(card => {
                const text = card.getAttribute("data-desc");
                const matches = text.match(/#[\\w\\u0600-\\u06FF_]+/g);
                if (matches) {
                    const uniqueTags = new Set(matches);
                    uniqueTags.forEach(tag => {
                        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    });
                }
            });

            if (Object.keys(tagCounts).length > 0) {
                document.getElementById("categoryNav").style.display = "block";
                const tagsContainer = document.getElementById("exportTags");
                
                const allBtn = document.createElement("button");
                allBtn.className = "tag-btn active";
                allBtn.innerHTML = 'الكل <span class="tag-count">' + totalProjects + '</span>';
                allBtn.onclick = function() { filterProjects(null, this); };
                tagsContainer.appendChild(allBtn);

                Object.keys(tagCounts).forEach(tag => {
                    const count = tagCounts[tag];
                    const btn = document.createElement("button");
                    btn.className = "tag-btn";
                    btn.innerHTML = tag + ' <span class="tag-count">' + count + '</span>';
                    btn.onclick = function() { filterProjects(tag, this); };
                    tagsContainer.appendChild(btn);
                });
            }

            document.querySelectorAll(".btn-copy").forEach(btn => {
                btn.addEventListener("click", function() {
                    copyUrl(this, this.dataset.url);
                });
            });
        });

        function filterProjects(tag, btnElement) {
            document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
            btnElement.classList.add("active");

            let visibleCount = 1;
            document.querySelectorAll(".project-card").forEach(card => {
                const text = card.getAttribute("data-desc");
                if (!tag || text.includes(tag)) {
                    card.style.display = "block";
                    card.querySelector('.project-number').innerText = visibleCount++; 
                } else {
                    card.style.display = "none";
                }
            });
        }

        function copyUrl(btn, url) {
            const done = () => {
                const originalText = btn.innerHTML;
                const originalBg = btn.style.backgroundColor;
                btn.innerHTML = '✅ تم النسخ';
                btn.style.backgroundColor = '#10b981';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = originalBg;
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url).then(done).catch(() => fallbackCopy(url, done));
            } else {
                fallbackCopy(url, done);
            }
        }

        function fallbackCopy(url, done) {
            const textarea = document.createElement("textarea");
            textarea.value = url;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
            done();
        }
    <\/script>
</body>
</html>`;

        persistSettingsLocally();
        downloadFile(
          `portfolio_${sanitizeFilename(title)}.html`,
          finalHTML,
          "text/html;charset=utf-8",
        );
      }
    </script>
  </body>
</html>
